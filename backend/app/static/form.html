<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Visitor Details — Check-In</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Confirm Details</h1>
      <p>Please review your information and tell us about your visit</p>
    </div>
    <div class="card-body">

      <!-- DL fields (pre-filled, editable) -->
      <div class="row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="first-name" autocomplete="given-name">
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="last-name" autocomplete="family-name">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Date of Birth</label>
          <input type="text" id="dob" readonly>
        </div>
        <div class="field">
          <label>License State</label>
          <input type="text" id="state" readonly>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Visit details (required) -->
      <div class="field">
        <label>Who are you visiting? <span style="color:#dc2626">*</span></label>
        <input type="text" id="visiting-whom" placeholder="e.g. John Smith" required autocomplete="off">
      </div>

      <div class="field">
        <label>Purpose of visit <span style="color:#dc2626">*</span></label>
        <select id="purpose" required>
          <option value="" disabled selected>Select a reason…</option>
          <option value="Meeting">Meeting</option>
          <option value="Interview">Interview</option>
          <option value="Delivery">Delivery</option>
          <option value="Contractor / Service">Contractor / Service</option>
          <option value="Tour">Tour</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div id="status" class="status"></div>

      <button id="btn-submit" class="btn btn-primary btn-full mt-4">
        <span id="btn-label">Check In &amp; Print Badge</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <button id="btn-back" class="btn btn-secondary btn-full mt-4">
        ← Rescan License
      </button>

    </div>
  </div>

  <script src="/js/form.js"></script>
</body>
</html>
